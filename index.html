<!DOCTYPE html>
<html>
<head>
<title>sterilisation -huim6</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f7f8;
    font-family: Arial;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #2c7a7b;
    color: white;
    border: none;
}

.error {
    color: red;
    display: none;
}
</style>

</head>

<body>

<div class="container">
    <img src="logo.png" width="100">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <p class="error" id="error">Username or Password incorrect</p>

    <button onclick="login()">LOGIN</button>
</div>

<script>

let users = [
    {username: "mohamed birgach", password: "2006"},
    {username: "abdlilah chicha", password: "1970"},
    {username: "mustapha samaoul", password: "2005"},
     {username: "asma elidrissi", password: "1234"}
];

function login() {

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let found = false;

    for(let i = 0; i < users.length; i++) {
        if(user === users[i].username && pass === users[i].password) {
            found = true;
            localStorage.setItem("user", user);
            window.location.href = "dashboard.html";
        }
    }

    if(!found){
        document.getElementById("error").style.display = "block";
    }
}

</script>

</body>
</html>
