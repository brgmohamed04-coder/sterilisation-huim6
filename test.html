
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Equipement </title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}

.header{
background:#198754;
color:white;
display:flex;
align-items:center;
justify-content:center;
position:relative;
padding:15px;
}

.leftHeader{
position:absolute;
left:10px;
text-align:center;
}

.logo{height:40px;display:block;margin:auto;}

.retour{
background:white;
color:#198754;
border:none;
padding:5px 10px;
margin-bottom:5px;
cursor:pointer;
}

.centerHeader{text-align:center;}

.container{
display:flex;
justify-content:center;
gap:30px;
margin-top:30px;
}

.box{
background:white;
width:260px;
padding:15px;
border-radius:10px;
text-align:center;
}

.imgBox{
width:80px;
height:80px;
object-fit:contain;
}

.valid{background:green;color:white;padding:6px;}
.invalid{background:red;color:white;padding:6px;}

.cycleText{font-weight:bold;}
</style>
</head>

<body>

<div class="header">

<div class="leftHeader">
<button class="retour" onclick="goBack()">⬅ Retour</button>
<img src="project/images/logo.png" class="logo">
</div>

<div class="centerHeader">
<h2>Test Equipement</h2>
<p id="userName"></p>
</div>

</div>

<div class="container">

<div class="box">
<img src="project/images/e2ce0d03e2ec26fb4b5fe6d6b88948d9.jpg" class="imgBox">
<h3>Autoclave 01</h3>
<p id="t1">Chauffage</p>
<p class="cycleText" id="c1"></p>
<button class="valid" onclick="next(1,true)">Valide</button>
<button class="invalid" onclick="next(1,false)">Non Valide</button>
</div>

<div class="box">
<img src="project/images/e2ce0d03e2ec26fb4b5fe6d6b88948d9.jpg" class="imgBox">
<h3>Autoclave 02</h3>
<p id="t2">Chauffage</p>
<p class="cycleText" id="c2"></p>
<button class="valid" onclick="next(2,true)">Valide</button>
<button class="invalid" onclick="next(2,false)">Non Valide</button>
</div>

<div class="box">
<img src="project/images/OIP.webp" class="imgBox">
<h3>Plasma</h3>
<p id="t3">Test a vide</p>
<p class="cycleText" id="c3"></p>
<button class="valid" onclick="next(3,true)">Valide</button>
<button class="invalid" onclick="next(3,false)">Non Valide</button>
</div>

</div>

<script>

let user="mohamed birgach";
document.getElementById("userName").innerText="User: "+user;

// cycles
let cycles = JSON.parse(localStorage.getItem("cycles"));
if(!cycles){
cycles = {1:11470,2:9700,3:500};
localStorage.setItem("cycles", JSON.stringify(cycles));
}

// afficher
document.getElementById("c1").innerText="Cycle: "+cycles[1];
document.getElementById("c2").innerText="Cycle: "+cycles[2];
document.getElementById("c3").innerText="Cycle: "+cycles[3];

// tests
let tests={
1:["Chauffage","Test a vide","Bowie Dick"],
2:["Chauffage","Test a vide","Bowie Dick"],
3:["Test a vide"]
};

let state={1:0,2:0,3:0};
let results={1:{},2:{},3:{}};

// NEXT (logic PRO)
function next(m,ok){

let test = tests[m][state[m]];

if(!results[m][test]){
results[m][test] = { non:[], val:null };
}

// ❌ NON VALIDE
if(!ok){
results[m][test].non.push(cycles[m]);
cycles[m]++;
updateStorage();

document.getElementById("c"+m).innerText="Cycle: "+cycles[m];
return;
}

// ✔️ VALIDE
results[m][test].val = cycles[m];
cycles[m]++;
updateStorage();

document.getElementById("c"+m).innerText="Cycle: "+cycles[m];

state[m]++;

if(state[m] < tests[m].length){
document.getElementById("t"+m).innerText = tests[m][state[m]];
}else{
generatePDF(m);
}
}

// SAVE
function updateStorage(){
localStorage.setItem("cycles", JSON.stringify(cycles));
}

// NAME
function getName(m){
return m==1?"Autoclave 01":m==2?"Autoclave 02":"Plasma";
}

// PDF FORMAT HOSPITAL 100%
function generatePDF(machine){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y=20;

// HEADER
doc.setFontSize(14);
doc.text("HOPITAL UNIVERSITAIRE",60,y);
y+=6;
doc.text("INTERNATIONAL MOHAMMED VI",40,y);

y+=10;
doc.text("CYCLE DE PRE-PRODUCTION",50,y);

y+=10;

// BOX INFO
doc.rect(20,y,80,20);
doc.setFontSize(10);
doc.text("Date: "+new Date().toLocaleDateString(),22,y+6);
doc.text("Machine: "+getName(machine),22,y+12);

doc.text("Operateur: "+user,120,y+10);

y+=30;

// TABLE HEADER
doc.text("TEST de pre-production",20,y);
y+=10;

doc.text("Test",20,y);
doc.text("Non Valide",80,y);
doc.text("Valide",140,y);

y+=8;

// TESTS
tests[machine].forEach(t=>{

let data = results[machine][t];

doc.text(t,20,y);

// ❌ NON VALIDE
doc.rect(80,y-4,5,5);
if(data?.non?.length){
doc.text("X",81,y-1);
doc.text(data.non.join(","),90,y);
}

// ✔️ VALIDE
doc.rect(140,y-4,5,5);
if(data?.val){
doc.text("X",141,y-1);
doc.text(data.val.toString(),150,y);
}

y+=10;
});

// NOTE
y+=10;
doc.text("NOTE:",20,y);
doc.line(20,y+5,180,y+5);

// SIGNATURE
y+=20;
doc.text("Signature operateur",120,y);

doc.save("rapport_"+getName(machine)+".pdf");
}

// RETOUR
function goBack(){
window.location.href="dashboard.html";
}

</script>

</body>
</html>
